<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="420" viewBox="0 0 1100 420" role="img" aria-label="Project flow architecture diagram">
  <rect width="1100" height="420" fill="#ffffff"/>
  <text x="40" y="58" font-family="Arial" font-size="32" font-weight="700" fill="#172033">Coding Demo Architecture</text>
  <g font-family="Arial" font-size="18" font-weight="700" text-anchor="middle">
    <rect x="70" y="145" width="170" height="78" rx="8" fill="#eef5ff" stroke="#276ef1"/>
    <text x="155" y="191" fill="#172033">Project Idea</text>
    <rect x="310" y="145" width="170" height="78" rx="8" fill="#eafaf5" stroke="#20b486"/>
    <text x="395" y="191" fill="#172033">Sprites / UI</text>
    <rect x="550" y="145" width="170" height="78" rx="8" fill="#fff4d8" stroke="#ffb703"/>
    <text x="635" y="191" fill="#172033">Logic Blocks</text>
    <rect x="790" y="145" width="170" height="78" rx="8" fill="#ffe8e9" stroke="#ff5a5f"/>
    <text x="875" y="191" fill="#172033">Live Demo</text>
  </g>
  <g stroke="#526070" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <path d="M240 184h70"/>
    <path d="M480 184h70"/>
    <path d="M720 184h70"/>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#526070"/>
    </marker>
  </defs>
  <text x="155" y="285" font-family="Arial" font-size="16" fill="#526070" text-anchor="middle">Goal and outcome</text>
  <text x="395" y="285" font-family="Arial" font-size="16" fill="#526070" text-anchor="middle">Objects on screen</text>
  <text x="635" y="285" font-family="Arial" font-size="16" fill="#526070" text-anchor="middle">Events, loops, rules</text>
  <text x="875" y="285" font-family="Arial" font-size="16" fill="#526070" text-anchor="middle">Teach and explain</text>
</svg>

