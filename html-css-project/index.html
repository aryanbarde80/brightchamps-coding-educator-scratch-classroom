<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Student Profile Card</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="page">
      <section class="profile-card" aria-label="Student profile card">
        <div class="avatar">BC</div>
        <div class="content">
          <p class="eyebrow">BrightChamps Demo</p>
          <h1>Aarav's Coding Club</h1>
          <p class="summary">
            A beginner-friendly profile card built with only HTML and CSS.
          </p>
          <div class="stats">
            <span><strong>4</strong> Projects</span>
            <span><strong>2</strong> Skills</span>
            <span><strong>30</strong> Min Demo</span>
          </div>
          <a class="button" href="#">Start Learning</a>
        </div>
      </section>
    </main>
  </body>
</html>
